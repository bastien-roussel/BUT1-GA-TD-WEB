  <form>

    <div class="container">

      <div class="row">
        <div class="col-6 mb-3">
          <label for="form-nom" class="form-label">NOM</label>
          <input type="text" class="form-control" id="form-nom" aria-describedby="nomHelp">
        </div>

        <div class="col-6 mb-3">
          <label for="form-prenom" class="form-label">Prénom</label>
          <input type="text" class="form-control" id="form-prenom" aria-describedby="prenomHelp">
        </div>
      </div>


      <div class="row">
        <div class="mb-3">
          <label for="form-mail" class="form-label">Adresse Email</label>
          <input type="email" class="form-control" id="form-mail" aria-describedby="emailHelp">
        </div>
      </div>

      <div class="row">
        <div class="col-8 mb-3">
          <label for="form-mdp" class="form-label">Mot de passe</label>
          <input type="password" class="form-control" id="form-mdp">
        </div>
      </div>

      <div class="row">
        <div class="mb-3">
          <label for="form-zt">Comments</label>
          <textarea class="form-control" placeholder="Ecrivez du texte ..." id="form-zt" rows="10"></textarea>
        </div>
      </div>
      

      <div class="row">

        <div class="col-6 mb-3">
          <p>Accepter les CGU ?</p>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault1">
            <label class="form-check-label" for="flexRadioDefault1">
              Oui
            </label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault2" checked>
            <label class="form-check-label" for="flexRadioDefault2">
              Non
            </label>
          </div>
        </div>
      </div>

      <div class="row justify-content-center">
        <div class="col-3">
          <button type="submit" class="btn btn-primary w-100">Envoyer</button>
        </div>
        <div class="col-3">
          <button type="submit" class="btn btn-danger w-100">Annuler</button>
        </div>        
        <div class="col-3">
          <button type="reset" class="btn btn-secondary w-100">RAZ</button>
        </div>
      </div>
    </div>

  </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
